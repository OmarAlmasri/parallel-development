spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

# Report config
app.report.recipient=${APP_REPORT_RECIPIENT:recipient@example.com}
app.report.schedule.transactions=${APP_REPORT_SCHEDULE_TRANSACTIONS:0 0 8 * * MON}
app.report.schedule.bestsellers=${APP_REPORT_SCHEDULE_BESTSELLERS:0 0 18 * * SUN}
app.events.enabled=${APP_EVENTS_ENABLED:true}

server.port=${SERVER_PORT:8080}
server.tomcat.mbeanregistry.enabled=true

# Resource Management
server.tomcat.threads.max=100
server.tomcat.accept-count=200
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=3000
app.capacity.max-concurrent-requests=60
app.capacity.max-wait-ms=200
app.async.core-pool-size=4
app.async.max-pool-size=8
app.async.queue-capacity=200

