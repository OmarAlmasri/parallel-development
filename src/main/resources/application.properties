spring.application.name=ecommerce
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:ecommerce;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
# spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.cache.cache-names=products,productLists
spring.cache.redis.time-to-live=${SPRING_CACHE_REDIS_TIME_TO_LIVE:10m}
spring.cache.redis.cache-null-values=false
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false
app.inventory.lock.type=${APP_INVENTORY_LOCK_TYPE:local}
app.inventory.lock.wait-time-ms=${APP_INVENTORY_LOCK_WAIT_TIME_MS:2000}
app.inventory.lock.watchdog-timeout-ms=${APP_INVENTORY_LOCK_WATCHDOG_TIMEOUT_MS:30000}
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:false}
management.health.redis.enabled=${MANAGEMENT_HEALTH_REDIS_ENABLED:false}
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.enable.tomcat=true
management.endpoint.metrics.enabled=true

# JWT
app.jwt.secret=${APP_JWT_SECRET:your_super_secret_key_must_be_at_least_32_characters}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Mail
