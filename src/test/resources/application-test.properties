spring.datasource.url=jdbc:h2:mem:ecommerce_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.cache.type=simple
app.inventory.lock.type=local
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false
app.events.enabled=false

app.jwt.secret=test_super_secret_key_must_be_at_least_32_chars
app.jwt.expiration-ms=86400000
# Disable scheduling during tests
spring.task.scheduling.enabled=false

# Mock mail for tests
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
